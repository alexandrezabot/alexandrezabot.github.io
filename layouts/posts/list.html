{{ define "main" }}
<h1>Astrofísica de A a Z</h1>
<div class="linha-indigo"></div>

Informe seus dados abaixo para se inscrever gratuitamente:

<style>
  .newsletter-embed {
    width: 50%;
    margin: 2rem auto;
    border: 2px solid #6168B9;
    border-radius: 8px;
    padding: 1rem;
  }
  @media (max-width: 768px) {
    .newsletter-embed {
      width: 95%;
      padding: 0.5rem;
    }
  }
</style>

<div class="newsletter-embed">
  <iframe
    src="https://newsletter.profzabot.com.br/f/GUgSs6SX8GISEo1Ud3NRExd6WAQJB2KRe8M49eJztJQ"
    width="100%"
    height="480"
    frameborder="0"
    scrolling="no"
    style="border:none; display:block;">
  </iframe>
</div>

<div class="posts-grid">
  {{ range .Pages.ByDate.Reverse }}
    <article class="post-card">
      <a href="{{ .Permalink }}" style="text-decoration: none; color: inherit;">
        <div class="post-card-title">{{ .Title }}</div>
      </a>
      <div class="post-meta">
        📅 {{ .Date.Format "02 de January de 2006" }}
      </div>
      <p>{{ .Summary }}</p>
      <div class="post-tags">
        {{ range .Params.tags }}
          <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
      <div style="margin-top: 1rem;">
        <a href="{{ .Permalink }}" style="color: #6168B9; font-weight: 500;">Ler mais →</a>
      </div>
    </article>
  {{ end }}
</div>
{{ end }}
