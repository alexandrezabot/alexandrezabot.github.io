<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Title }} | Prof. Alexandre Zabot</title>
<meta name="description" content="{{ .Params.descricao }}">
<link rel="canonical" href="{{ .Permalink }}">

<meta property="og:type" content="website">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ .Params.descricao }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ with .Resources.GetMatch "capa*" }}<meta property="og:image" content="{{ .Permalink }}">{{ end }}
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400;1,600;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/curso.css" | relURL }}">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-YY0YJ7HRDS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-YY0YJ7HRDS');
  function irCheckout(origem) {
    gtag('event', 'begin_checkout', {
      origem: origem,
      curso: {{ .Title }}
    });
    window.location.href = {{ .Params.checkout }};
    return false;
  }
</script>
</head>
