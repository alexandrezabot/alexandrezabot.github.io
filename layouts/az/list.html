{{ define "main" }}
<h1>Astrofísica de A a Z</h1>
<div class="linha-indigo"></div>

<p>Informe seus dados abaixo para se inscrever gratuitamente:</p>

<div class="newsletter-embed">
  <iframe
    src="https://newsletter.profzabot.com.br/f/GUgSs6SX8GISEo1Ud3NRExd6WAQJB2KRe8M49eJztJQ"
    width="100%"
    height="480"
    frameborder="0"
    scrolling="no"
    style="border:none; display:block;">
  </iframe>
</div>

<div class="posts-grid">
  {{ range .Pages.ByDate.Reverse }}
    <article class="post-card">
      <a href="{{ .Permalink }}" style="text-decoration: none; color: inherit;">
        <div class="post-card-title">{{ .Title }}</div>
      </a>
      <div class="post-meta">{{ .Date | time.Format ":date_long" }}</div>
      <p>{{ .Params.description }}</p>
      <div class="post-tags">
        {{ range .Params.tags }}
          <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
      <div style="margin-top: 1rem;">
        <a href="{{ .Permalink }}">Ler mais →</a>
      </div>
    </article>
  {{ end }}
</div>
{{ end }}
