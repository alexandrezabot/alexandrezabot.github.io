<figure style="margin: 2rem 0; text-align: center;">
  <img src="{{ .Get "src" }}" alt="{{ .Get "alt" }}" style="max-width: 100%; height: auto; border-radius: 8px; border-top: 2px solid #6168B9;">
  <figcaption style="color: #FD8354; font-style: italic; margin-top: 0.8rem; font-size: 13px;">{{ .Get "caption" }}</figcaption>
</figure>
