{{ define "main" }}
<div class="linha-indigo"></div>
<h1>{{ .Title }}</h1>
{{ .Content }}
<div class="artigos-list">
  {{ range .Pages.ByDate }}
    <div class="artigo-item">
      <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
      <p class="data">{{ .Date | time.Format ":date_long" }}</p>
    </div>
  {{ end }}
</div>
{{ end }}
